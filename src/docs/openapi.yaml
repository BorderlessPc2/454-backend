openapi: 3.0.3
info:
  title: Sistema de Relatórios API
  description: |
    API de gerenciamento de relatórios técnicos, clientes, usuários e cadastros auxiliares.

    **Autenticação:** na maioria das rotas, envie `Authorization: Bearer <token>` obtido em `POST /auth/login`.

    **Horário de login:** `POST /auth/login` pode retornar `403` se estiver fora da janela configurada em `/configuracoes` (ADMIN altera com `PUT`).
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Desenvolvimento local

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Clientes
  - name: Relatórios
  - name: Calendário
  - name: Checklists
  - name: Setores
  - name: Ramos
  - name: Configurações
  - name: Dashboard
  - name: Admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Token JWT retornado pelo login. Validade configurável pela env `JWT_EXPIRES_IN`
        no servidor (padrão `8h` se não definido).

  schemas:
    ErrorMessage:
      type: object
      properties:
        error:
          type: string
      required: [error]

    HealthOk:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id: { type: integer }
            username: { type: string }
            nome: { type: string }
            role: { type: string, enum: [ADMIN, TECNICO] }
            clienteId: { type: integer, nullable: true }
            unidadeId: { type: integer, nullable: true }

    ResetPasswordRequest:
      type: object
      required: [username, newPassword]
      properties:
        username:
          type: string
        newPassword:
          type: string
          format: password

    ResetPasswordResponse:
      type: object
      properties:
        message:
          type: string
          example: Senha resetada com sucesso
        user:
          type: object
          description: Dados públicos do usuário atualizados

    CreateUserRequest:
      type: object
      required: [username, password, nome, email, role]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        nome: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [ADMIN, TECNICO] }
        clienteId:
          type: integer
          nullable: true
          description: Opcional. Vínculo com cliente (não define unidade).
        unidadeId:
          type: integer
          description: >
            Opcional/legado. Cliente não possui unidade — este campo não é
            derivado de clienteId.

    UpdateUserRequest:
      type: object
      properties:
        nome: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [ADMIN, TECNICO] }
        clienteId:
          type: integer
          nullable: true
          description: null remove o vínculo com cliente.
        unidadeId:
          type: integer
          nullable: true
          description: Opcional/legado. Não derivado do cliente.
        ativo: { type: boolean }

    ChangePasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          format: password

    UserPublic:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        nome: { type: string }
        email: { type: string }
        role: { type: string, enum: [ADMIN, TECNICO] }
        clienteId: { type: integer, nullable: true }
        ativo: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateContatoRequest:
      type: object
      required: [nome]
      properties:
        nome: { type: string }
        cargo: { type: string }
        telefone: { type: string }
        email: { type: string, format: email }
        principal: { type: boolean }

    CreateContratoRequest:
      type: object
      required: [numeroContrato, dataInicio, dataFim, valorMensal, descricaoServicos]
      properties:
        numeroContrato: { type: string }
        dataInicio: { type: string, format: date-time, description: ISO 8601 }
        dataFim: { type: string, format: date-time, description: ISO 8601 }
        valorMensal: { type: number }
        descricaoServicos: { type: string }
        condicoes: { type: string }

    CreateClienteRequest:
      type: object
      required:
        - razaoSocial
        - nomeFantasia
        - cnpj
        - endereco
        - cidade
        - estado
        - cep
        - ramoAtividadeId
        - contato
        - contrato
      properties:
        razaoSocial: { type: string }
        nomeFantasia: { type: string }
        cnpj: { type: string }
        inscricaoEstadual: { type: string }
        endereco: { type: string }
        cidade: { type: string }
        estado: { type: string }
        cep: { type: string }
        telefone: { type: string }
        email: { type: string, format: email }
        ramoAtividadeId: { type: integer }
        contato:
          $ref: "#/components/schemas/CreateContatoRequest"
        contrato:
          $ref: "#/components/schemas/CreateContratoRequest"

    UpdateClienteRequest:
      type: object
      properties:
        razaoSocial: { type: string }
        nomeFantasia: { type: string }
        cnpj: { type: string }
        inscricaoEstadual: { type: string }
        endereco: { type: string }
        cidade: { type: string }
        estado: { type: string }
        cep: { type: string }
        telefone: { type: string }
        email: { type: string }
        ramoAtividadeId: { type: integer }
        ativo: { type: boolean }
        contato:
          $ref: "#/components/schemas/UpdateContatoRequest"
        contrato:
          $ref: "#/components/schemas/UpdateContratoRequest"

    UpdateContatoRequest:
      type: object
      properties:
        nome: { type: string }
        cargo: { type: string }
        telefone: { type: string }
        email: { type: string }
        principal: { type: boolean }

    UpdateContratoRequest:
      type: object
      properties:
        numeroContrato: { type: string }
        dataInicio: { type: string, format: date-time }
        dataFim: { type: string, format: date-time }
        valorMensal: { type: number }
        descricaoServicos: { type: string }
        condicoes: { type: string }

    ModalidadeServico:
      type: string
      enum:
        - local
        - remoto
      description: >
        Local ou remoto. A presença de contrato ativo é resolvida pelo cadastro
        do cliente na data da visita (não faz parte deste campo).

    RelatorioSetorItem:
      type: object
      required: [setorId]
      properties:
        setorId: { type: integer }
        observacao: { type: string }

    RelatorioHorarioItem:
      type: object
      required: [horaChegada, horaSaida]
      properties:
        horaChegada: { type: string, format: date-time, description: ISO 8601 }
        horaSaida: { type: string, format: date-time, description: ISO 8601 }

    RelatorioChecklistItem:
      type: object
      required: [checklistId]
      properties:
        checklistId: { type: integer }

    CreateRelatorioRequest:
      type: object
      required: [clienteId, dataVisita, tecnicos, setores, checklists]
      anyOf:
        - required: [modalidade]
        - required: [modalidadeServico]
      properties:
        clienteId: { type: integer }
        contatoId: { type: integer }
        dataVisita: { type: string, format: date-time }
        modalidade:
          allOf:
            - $ref: "#/components/schemas/ModalidadeServico"
          description: Alias aceito para `modalidadeServico` (use apenas um dos dois campos).
        modalidadeServico:
          allOf:
            - $ref: "#/components/schemas/ModalidadeServico"
          description: Campo legado; pode ser enviado no lugar de `modalidade`.
        observacoes: { type: string }
        tecnicos:
          type: array
          items: { type: string }
          description: Nomes dos técnicos (strings)
        setores:
          type: array
          items:
            $ref: "#/components/schemas/RelatorioSetorItem"
        horarios:
          type: array
          items:
            $ref: "#/components/schemas/RelatorioHorarioItem"
        checklists:
          type: array
          items:
            $ref: "#/components/schemas/RelatorioChecklistItem"

    UpdateRelatorioRequest:
      type: object
      properties:
        clienteId: { type: integer }
        contatoId: { type: integer }
        dataVisita: { type: string, format: date-time }
        modalidade:
          allOf:
            - $ref: "#/components/schemas/ModalidadeServico"
          description: Alias aceito para `modalidadeServico` (use apenas um dos dois campos).
        modalidadeServico:
          allOf:
            - $ref: "#/components/schemas/ModalidadeServico"
          description: Campo legado; pode ser enviado no lugar de `modalidade`.
        observacoes: { type: string }
        impresso: { type: boolean }
        tecnicos:
          type: array
          items: { type: string }
        setores:
          type: array
          items:
            $ref: "#/components/schemas/RelatorioSetorItem"
        horarios:
          type: array
          items:
            $ref: "#/components/schemas/RelatorioHorarioItem"
        checklists:
          type: array
          items:
            $ref: "#/components/schemas/RelatorioChecklistItem"

    CreateChecklistRequest:
      type: object
      required: [nome]
      properties:
        nome: { type: string }
        descricao: { type: string }
        indice:
          type: integer
          minimum: 0
        itens:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistItemPayload"

    UpdateChecklistRequest:
      type: object
      properties:
        nome: { type: string }
        descricao: { type: string }
        indice:
          type: integer
          minimum: 0
        ativo: { type: boolean }
        itens:
          type: array
          items:
            $ref: "#/components/schemas/ChecklistItemPayload"

    ChecklistItemPayload:
      type: object
      required: [texto, ordem]
      properties:
        texto: { type: string }
        ordem:
          type: integer
          minimum: 0

    ReorderChecklistRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [id, indice]
            properties:
              id:
                type: integer
              indice:
                type: integer
                minimum: 0

    CreateSetorRequest:
      type: object
      required: [nome]
      properties:
        nome: { type: string }
        descricao: { type: string }

    UpdateSetorRequest:
      type: object
      properties:
        nome: { type: string }
        descricao: { type: string }

    CreateRamoRequest:
      type: object
      required: [nome]
      properties:
        nome: { type: string }

    UpdateRamoRequest:
      type: object
      properties:
        nome: { type: string }

    ConfiguracaoUpsertRequest:
      type: object
      description: >
        Envie dataInicio+dataFim (juntos), e/ou textoRodapeRelatorio, logoUrl,
        logoDarkUrl e/ou themePalette. Pode atualizar só um bloco sem reenviar os demais.
      properties:
        dataInicio:
          type: string
          format: date-time
          description: ISO 8601 — hora do dia é usada na janela de login (par obrigatório com dataFim)
        dataFim:
          type: string
          format: date-time
        horaInicio: { type: string, example: "08:00" }
        horaFim: { type: string, example: "18:00" }
        textoRodapeRelatorio:
          type: string
          nullable: true
          description: Texto/HTML do rodapé usado na impressão ou PDF do relatório (aba Administração).
        logoUrl:
          type: string
          nullable: true
          description: Path `/uploads/...`, URL absoluta ou `null` para limpar a logo clara.
        logoDarkUrl:
          type: string
          nullable: true
          description: Path `/uploads/...`, URL absoluta ou `null` para limpar a logo dark.
        themePalette:
          type: object
          nullable: true
          additionalProperties: true

    ConfiguracaoRecord:
      type: object
      properties:
        id: { type: integer, nullable: true }
        dataInicio: { type: string, format: date-time }
        dataFim: { type: string, format: date-time }
        textoRodapeRelatorio:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
          description: URL pública da logo clara (light). Inclui `?v=` com cache-bust.
        logoDarkUrl:
          type: string
          nullable: true
          description: URL pública da logo escura (dark mode). Arquivo distinto (`system-logo-dark.*`).
        themePalette:
          type: object
          nullable: true
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }


    CreateCalendarioEventoRequest:
      type: object
      required: [titulo, dataInicio, dataFim]
      properties:
        titulo: { type: string, maxLength: 200 }
        descricao: { type: string, nullable: true }
        dataInicio:
          type: string
          format: date
          description: YYYY-MM-DD inclusivo
        dataFim:
          type: string
          format: date
          description: YYYY-MM-DD inclusivo (pode igualar dataInicio)
        clienteId: { type: integer, nullable: true }

    UpdateCalendarioEventoRequest:
      type: object
      properties:
        titulo: { type: string, maxLength: 200 }
        descricao: { type: string, nullable: true }
        dataInicio: { type: string, format: date }
        dataFim: { type: string, format: date }
        clienteId: { type: integer, nullable: true }

    CalendarioEvento:
      type: object
      description: >
        Formato FullCalendar. allDay=true; end é exclusivo (dataFim+1).
        Datas inclusivas em extendedProps.dataInicio/dataFim.
      properties:
        id: { type: string }
        title: { type: string }
        start: { type: string, format: date }
        end: { type: string, format: date, description: Exclusivo para FullCalendar }
        allDay: { type: boolean, enum: [true] }
        classNames:
          type: array
          items: { type: string }
        extendedProps:
          type: object
          properties:
            dataInicio: { type: string, format: date }
            dataFim: { type: string, format: date }
            descricao: { type: string, nullable: true }
            clienteId: { type: integer, nullable: true }
            clienteNome: { type: string, nullable: true }
            criadoPorId: { type: integer }
            criadoPorNome: { type: string }


paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: API disponível
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login (JWT)
      description: Pode retornar 403 fora do horário configurado em configurações.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Token e dados do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Credenciais inválidas ou usuário inativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Fora do horário de login permitido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Redefinir senha por username (somente ADMIN)
      description: Exige autenticação JWT com perfil ADMIN.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Senha atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Acesso negado (apenas ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /users/tecnico:
    get:
      tags: [Users]
      summary: Listar técnicos elegíveis para relatório (ADMIN e TECNICO ativos)
      description: |
        Qualquer usuário autenticado. Retorna usuários com role ADMIN ou TECNICO
        e `ativo = true`, ordenados por nome. ADMIN vê todos; TECNICO vê a própria
        unidade e administradores globais (sem unidade vinculada).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de técnicos elegíveis
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Técnico sem unidade vinculada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /users:
    post:
      tags: [Users]
      summary: Criar usuário
      description: Somente ADMIN.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Usuário criado
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Acesso negado
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    get:
      tags: [Users]
      summary: Listar todos os usuários
      description: Somente ADMIN.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuários
        "403": { description: Acesso negado }
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Users]
      summary: Buscar usuário por id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403": { description: Acesso negado }
    put:
      tags: [Users]
      summary: Atualizar usuário
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Atualizado
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403": { description: Acesso negado }
    delete:
      tags: [Users]
      summary: Remover usuário
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removido
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403": { description: Acesso negado }

  /users/{id}/password:
    put:
      tags: [Users]
      summary: Alterar senha do usuário (ADMIN)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Senha alterada
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403": { description: Acesso negado }

  /clientes:
    get:
      tags: [Clientes]
      summary: Listar clientes
      description: |
        Lista todos os clientes (sem filtro por unidade — clientes não possuem `unidadeId`).
        Filtros opcionais (query): `nomeFantasia`, `cnpj`, `ramoAtividadeId` (número).
      security:
        - bearerAuth: []
      parameters:
        - name: nomeFantasia
          in: query
          schema: { type: string }
        - name: cnpj
          in: query
          schema: { type: string }
        - name: ramoAtividadeId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Lista de clientes (com relações conforme service)
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      tags: [Clientes]
      summary: Criar cliente (com contato e contrato iniciais)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClienteRequest"
      responses:
        "201":
          description: Cliente criado
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /clientes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Clientes]
      summary: Buscar cliente por id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cliente
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      tags: [Clientes]
      summary: Atualizar cliente
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClienteRequest"
      responses:
        "200":
          description: Atualizado
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      tags: [Clientes]
      summary: Remover cliente
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removido
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /clientes/{id}/contatos:
    post:
      tags: [Clientes]
      summary: Criar contato para o cliente
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContatoRequest"
      responses:
        "201":
          description: Contato criado
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /clientes/{id}/contatos/{contatoId}:
    put:
      tags: [Clientes]
      summary: Atualizar contato
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: contatoId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContatoRequest"
      responses:
        "200":
          description: Atualizado
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      tags: [Clientes]
      summary: Remover contato
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: contatoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removido
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /relatorios:
    get:
      tags: [Relatórios]
      summary: Listar relatórios
      description: |
        Lista relatórios. Clientes não possuem mais `unidadeId` — não há isolamento
        por organização via cliente.
        Filtros opcionais: `clienteId`, `dataInicio`, `dataFim`, `impresso` (`true`/`false`).
        O filtro `criadoPorId` aplica-se somente quando o usuário é **ADMIN**
        (técnicos veem todos os relatórios; edição/exclusão seguem regras do service).
      security:
        - bearerAuth: []
      parameters:
        - name: clienteId
          in: query
          schema: { type: integer }
        - name: criadoPorId
          in: query
          schema: { type: integer }
          description: Somente ADMIN — filtra por criador do relatório. Ignorado para role TECNICO.
        - name: dataInicio
          in: query
          schema: { type: string, format: date }
        - name: dataFim
          in: query
          schema: { type: string, format: date }
        - name: impresso
          in: query
          schema: { type: string, enum: ["true", "false"] }
      responses:
        "200":
          description: Lista de relatórios
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      tags: [Relatórios]
      summary: Criar relatório
      description: |
        O campo `criadoPorId` é preenchido com o usuário do JWT.
        `modalidade` / `modalidadeServico` aceitam apenas `local` ou `remoto`.
        Contrato ativo do cliente é resolvido automaticamente na data da visita
        (exibido no PDF como N° contrato), sem constar no valor da modalidade.
        A criação é transacional: o relatório só é persistido se todos os vínculos filhos (setores, horários e checklists) forem salvos com sucesso.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRelatorioRequest"
      responses:
        "201":
          description: Relatório criado
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /relatorios/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Relatórios]
      summary: Buscar relatório por id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Relatório
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      tags: [Relatórios]
      summary: Atualizar relatório
      description: |
        **TECNICO:** só pode atualizar relatórios em que é o criador (`criadoPorId`).
        **ADMIN:** atualiza relatórios no escopo de unidade ou global conforme token.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRelatorioRequest"
      responses:
        "200":
          description: Atualizado
        "403":
          description: Técnico tentando editar relatório de outro usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      tags: [Relatórios]
      summary: Remover relatório
      description: |
        **TECNICO:** só pode excluir relatórios que criou.
        **ADMIN:** remove no escopo permitido pelo token.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removido
        "403":
          description: Técnico tentando excluir relatório de outro usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /relatorios/{id}/pdf-layout:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Relatórios]
      summary: Gerar layout de relatório para PDF
      description: Retorna HTML com cabeçalho profissional e rodapé para assinatura.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Layout pronto para renderização em PDF
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /relatorios/{id}/enviar-email:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Relatórios]
      summary: Enviar PDF do relatório por e-mail
      description: >
        Gera o PDF do relatório e envia para o e-mail do contato vinculado
        (SMTP Gmail). Exige SMTP_USER e SMTP_PASS configurados.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: E-mail enviado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Relatório enviado por e-mail com sucesso
        "400":
          description: Contato sem e-mail ou ID inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "503":
          description: Geração de PDF indisponível
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

