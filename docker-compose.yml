services:
  postgres:
    image: bitnami/postgresql:latest
    ports:
      # 5433 no host evita conflito com Postgres já instalado na máquina (5432)
      - '5433:5432'
    environment:
      - POSTGRES_USER=linq
      - POSTGRES_PASSWORD=linqq608U
      - POSTGRES_DB=polls
    volumes:
      - polls_pg_data:/bitnami/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: bitnami/redis:latest
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      # 6380 no host evita conflito com Redis/outro serviço já na 6379
      - '6380:6379'
    volumes:
      - 'polls_redis_data:/bitnami/redis/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  polls_pg_data:
  polls_redis_data:
