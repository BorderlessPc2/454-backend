services:
  # Aplicação Web Backend
  - type: web
    name: 454-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        sync: false
      - key: OPS_REQUEST_LOG
        sync: false
      - key: EXPOSE_API_DOCS
        sync: false
      - key: CORS_ORIGIN
        value: https://seu-site.netlify.app,http://localhost:5173
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
    autoDeploy: true
